document.getElementById("sub").textContent =
  `Generated ${BASE.generated_at} · range ${new Date(BASE.range.from).toISOString().slice(0,10)} → ${new Date(BASE.range.to).toISOString().slice(0,10)}`;

function fmt$(n){ return "$" + Math.round(n).toLocaleString(); }
function fmtPct(n){ return n.toFixed(2) + "%"; }

function makeRow(k, v) {
  const r = document.createElement("div"); r.className = "row";
  const ks = document.createElement("span"); ks.className = "k"; ks.textContent = k;
  const vs = document.createElement("span"); vs.className = "v"; vs.textContent = v;
  r.appendChild(ks); r.appendChild(vs);
  return r;
}

function fillKpi(elId, s, isHtf){
  const el = document.getElementById(elId);
  const rows = [
    ["Trades", s.totalTrades.toLocaleString()],
    ["Closed / Open", s.closed.toLocaleString() + " / " + s.open],
    ["Win rate", fmtPct(s.winRate)],
    ["Final equity", fmt$(s.finalEquity)],
    ["ROI", fmtPct(s.roi)],
    ["Net PnL", fmt$(s.netPnl)],
    ["Profit factor", s.profitFactor.toFixed(2)],
    ["Max DD", fmt$(s.maxDrawdownUsd)],
    ["Liquidations", s.liquidations.toLocaleString()],
    ["Avg hold", s.avgHold5m.toFixed(1) + " × 5m"],
  ];
  if (isHtf && s.skippedByHtf !== undefined) rows.push(["Skipped by HTF", s.skippedByHtf.toLocaleString()]);
  for (const [k,v] of rows) el.appendChild(makeRow(k,v));
}
fillKpi("kBase", BASE.summary, false);
fillKpi("kHtf", HTF.summary, true);

// Delta table
const metrics = [
  ["Trades", "totalTrades", "n"],
  ["Win rate %", "winRate", "p"],
  ["Final equity", "finalEquity", "$"],
  ["ROI %", "roi", "p"],
  ["Net PnL", "netPnl", "$"],
  ["Profit factor", "profitFactor", "x"],
  ["Max DD", "maxDrawdownUsd", "$"],
  ["Liquidations", "liquidations", "n"],
];
const tb = document.getElementById("deltaTbody");
function fmtVal(v, kind){
  if (kind === "$") return fmt$(v);
  if (kind === "p") return v.toFixed(2) + "%";
  if (kind === "x") return v.toFixed(2);
  return v.toLocaleString();
}
function makeTd(text, cls) {
  const td = document.createElement("td");
  if (cls) td.className = cls;
  td.textContent = text;
  return td;
}
for (const [label, key, kind] of metrics) {
  const a = BASE.summary[key];
  const b = HTF.summary[key];
  const d = b - a;
  const pct = a !== 0 ? (d / Math.abs(a)) * 100 : 0;
  const smallerBetter = (key === "maxDrawdownUsd" || key === "liquidations");
  const good = smallerBetter ? d < 0 : d > 0;
  const cls = d === 0 ? "delta-eq" : good ? "delta-up" : "delta-dn";
  const sign = d > 0 ? "+" : "";
  const tr = document.createElement("tr");
  tr.appendChild(makeTd(label));
  tr.appendChild(makeTd(fmtVal(a, kind), "tnum"));
  tr.appendChild(makeTd(fmtVal(b, kind), "tnum"));
  tr.appendChild(makeTd(sign + fmtVal(d, kind), "tnum " + cls));
  tr.appendChild(makeTd(sign + pct.toFixed(1) + "%", "tnum " + cls));
  tb.appendChild(tr);
}

// Equity chart
const baseData = BASE.equityCurve.map(p => ({x: p.t, y: p.eq}));
const htfData  = HTF.equityCurve.map(p => ({x: p.t, y: p.eq}));
new Chart(document.getElementById("chart"), {
  type: "line",
  data: {
    datasets: [
      { label: "Baseline", data: baseData, borderColor:"#60a5fa", backgroundColor:"rgba(96,165,250,0.08)", borderWidth:1.5, pointRadius:0, tension:0.1, fill:true },
      { label: "HTF",      data: htfData,  borderColor:"#f7931a", backgroundColor:"rgba(247,147,26,0.08)", borderWidth:1.5, pointRadius:0, tension:0.1, fill:true },
    ]
  },
  options: {
    parsing:false,
    plugins:{ legend:{display:false} },
    scales:{
      x:{ type:"time", time:{unit:"month"}, ticks:{color:"#9aa0a6"}, grid:{color:"#22242a"} },
      y:{ ticks:{color:"#9aa0a6", callback:(v)=>"$"+(v/1000).toFixed(0)+"k"}, grid:{color:"#22242a"} },
    }
  }
});

// By source net bar chart
const allSources = Array.from(new Set([...Object.keys(BASE.bySource), ...Object.keys(HTF.bySource)])).sort();
new Chart(document.getElementById("srcChart"), {
  type: "bar",
  data: {
    labels: allSources,
    datasets: [
      { label:"Baseline", data: allSources.map(s => BASE.bySource[s]?.netUsd ?? 0), backgroundColor:"#60a5fa" },
      { label:"HTF",      data: allSources.map(s => HTF.bySource[s]?.netUsd ?? 0),  backgroundColor:"#f7931a" },
    ]
  },
  options: {
    plugins:{ legend:{labels:{color:"#9aa0a6"}} },
    scales:{
      x:{ ticks:{color:"#9aa0a6"}, grid:{color:"#22242a"} },
      y:{ ticks:{color:"#9aa0a6", callback:(v)=>"$"+(v/1000).toFixed(0)+"k"}, grid:{color:"#22242a"} },
    }
  }
});
