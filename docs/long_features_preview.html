    ${topCold.map(([k,s]) => `<tr class="cold"><td class="mono small">${k}</td><td>${s.n}</td><td style="color:#ef4444;font-weight:700">${s.wr.toFixed(1)}%</td><td class="edge-neg">${s.edge.toFixed(1)}%</td></tr>`).join('')}
    </tbody></table></div></div></div>`;
  tfsEl.innerHTML += html;
}
</script>
</body>
