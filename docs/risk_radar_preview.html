<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Risk Radar Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#0a0a1a; color:#fff; font-family:monospace; padding:0; min-height:100vh; }
  .phone { max-width:440px; margin:0 auto; background:#0a0a1a; min-height:100vh; padding:48px 12px 40px; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .back-btn { padding:6px 10px; background:#0d1117; border:1px solid #ffffff20; border-radius:6px; color:#fff; font-size:11px; font-weight:700; }
  .title { color:#f7931a; font-size:18px; font-weight:900; letter-spacing:2px; }
  .subtitle { color:#666; font-size:11px; text-align:center; margin-bottom:14px; }
  .score-card { background:#0d1117; border:2px solid; border-radius:10px; padding:14px; margin-bottom:18px; }
  .verdict { font-size:16px; font-weight:900; letter-spacing:2px; text-align:center; margin-bottom:12px; }
  .score-row { display:flex; justify-content:space-around; }
  .score-col { text-align:center; }
  .score-label { font-size:10px; font-weight:900; letter-spacing:1px; margin-bottom:4px; }
  .stars { font-size:16px; letter-spacing:3px; }
  .star-on { color:#f7931a; }
  .star-off { color:#333; }
  .section-title { color:#f7931a; font-size:13px; font-weight:900; letter-spacing:1px; margin-top:20px; margin-bottom:4px; }
  .section-sub { color:#666; font-size:10px; margin-bottom:8px; }
  .golden-card { border:1px solid; border-radius:8px; padding:10px; margin-bottom:8px; }
  .golden-card.pass { border-color:#f7931a; background:#f7931a22; border-width:2px; }
  .golden-header { display:flex; justify-content:space-between; margin-bottom:2px; }
  .golden-title { font-size:12px; font-weight:900; flex:1; }
  .golden-badge { color:#f7931a; font-size:10px; font-weight:700; }
  .golden-tpsl { color:#aaa; font-size:10px; margin-bottom:6px; }
  .cond-row { display:flex; align-items:center; padding:2px 0; font-size:11px; }
  .cond-icon { width:18px; font-weight:900; }
  .cond-label { flex:1; }
  .cond-live { font-size:10px; font-weight:700; }
  .pass-yes { color:#2ed573; }
  .pass-no { color:#666; }
  .fire-badge { margin-top:8px; padding:6px; background:#f7931a40; border-radius:4px; text-align:center; color:#f7931a; font-size:11px; font-weight:900; letter-spacing:1px; }
  .warn-row { display:flex; align-items:center; padding:8px 10px; border-left:3px solid; border-radius:4px; margin-bottom:4px; }
  .warn-danger { border-color:#ff4757; background:#ff475712; }
  .warn-caution { border-color:#ffa502; background:#ffa50212; }
  .warn-safe { border-color:#2ed573; background:#2ed57312; }
  .warn-icon { font-size:14px; margin-right:8px; }
  .warn-title { font-size:11px; font-weight:700; }
  .warn-title.active { color:#ff4757; }
  .warn-title.inactive { color:#aaa; }
  .warn-detail { color:#666; font-size:10px; margin-top:2px; }
  .snap-card { background:#0d1117; border:1px solid #ffffff15; border-radius:8px; padding:12px; }
  .snap-line { color:#aaa; font-size:11px; margin-bottom:3px; }
  .snap-val { color:#fff; font-weight:700; }
  .tabbar { position:sticky; top:0; background:#0a0a1a; padding:10px 0; border-bottom:1px solid #222; z-index:10; text-align:center; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <button class="back-btn">← Dashboard</button>
    <div class="title">🎯 RISK RADAR</div>
    <div style="width:90px"></div>
  </div>
  <div class="subtitle">Lesson learn từ 20K entry scan (2.7 năm) · Live BTC $<span id="price">—</span></div>

  <div class="score-card" id="scoreCard">
    <div class="verdict" id="verdict"></div>
    <div class="score-row">
      <div class="score-col">
        <div class="score-label" style="color:#2ed573">LONG SAFETY</div>
        <div class="stars" id="longStars"></div>
      </div>
      <div class="score-col">
        <div class="score-label" style="color:#ff4757">SHORT SAFETY</div>
        <div class="stars" id="shortStars"></div>
      </div>
    </div>
  </div>

  <div class="section-title">💎 CƠ HỘI VÀNG</div>
  <div class="section-sub">Rule đỉnh từ scan-features TP+5/SL-2 — firing = vào lệnh ngay</div>
  <div id="goldens"></div>

  <div class="section-title" style="color:#2ed573; margin-top:20px">⛔ TRÁNH LONG — 5 điều kiện xấu</div>
  <div class="section-sub" id="longSub"></div>
  <div id="longWarnings"></div>

  <div class="section-title" style="color:#ff4757; margin-top:20px">⛔ TRÁNH SHORT — 3 điều kiện xấu</div>
  <div class="section-sub" id="shortSub"></div>
  <div id="shortWarnings"></div>

  <div class="section-title" style="margin-top:20px">📡 INDICATOR LIVE</div>
  <div class="snap-card" id="snap"></div>
</div>

<script>
const STATE = {"rsi1h":65.10639871578115,"macdHist1h":91.62174688571075,"atrPct1h":0.5979480350383,"atrPct15m":0.2633902050203613,"atrPct4h":1.2391196875372703,"emaDist1h":1.588491373808412,"emaDist4h":3.6616192349643453,"htf4hState":"UP","price":75842};

function htfState(d) { if (d === null) return "NA"; if (d > 0.5) return "UP"; if (d < -0.5) return "DOWN"; return "FLAT"; }

const s = STATE;
const htf4h = s.htf4hState;
document.getElementById('price').textContent = s.price.toLocaleString();

// Warnings
const longWarnings = [
  { id:"long_htf_down", level: htf4h==="DOWN"?"danger":"safe", title:"HTF 4h DOWN", detail:`EMA50 Δ = ${s.emaDist4h>=0?"+":""}${s.emaDist4h.toFixed(2)}%`, lesson:"WR 15.7%", active: htf4h==="DOWN" },
  { id:"long_ema_far", level: s.emaDist1h>2?"danger":s.emaDist1h>1.2?"caution":"safe", title:"Giá 1h xa trên EMA50 (>2%)", detail:`EMA50 Δ = +${s.emaDist1h.toFixed(2)}%`, lesson:"WR 17.4%", active: s.emaDist1h>2 },
  { id:"long_rsi_os", level: s.rsi1h<30?"danger":s.rsi1h<35?"caution":"safe", title:"RSI 1h < 30 (dao rơi)", detail:`RSI = ${s.rsi1h.toFixed(1)}`, lesson:"WR 17.6%", active: s.rsi1h<30 },
  { id:"long_atr15m_low", level: s.atrPct15m<0.3?"danger":"safe", title:"15m ATR<0.3% (đừng LONG 15m)", detail:`ATR = ${s.atrPct15m.toFixed(2)}%`, lesson:"WR 9.5%", active: s.atrPct15m<0.3 },
  { id:"long_macd_weak", level: s.macdHist1h<-50?"caution":"safe", title:"MACD 1h Hist < -50", detail:`MACD Hist = ${s.macdHist1h.toFixed(1)}`, lesson:"WR 21.7%", active: s.macdHist1h<-50 },
];
const shortWarnings = [
  { id:"short_htf_up", level: htf4h==="UP"?"danger":"safe", title:"HTF 4h UP (đừng SHORT chống trend)", detail:`EMA50 Δ = ${s.emaDist4h>=0?"+":""}${s.emaDist4h.toFixed(2)}%`, lesson:"edge -10%", active: htf4h==="UP" },
  { id:"short_ema_low", level: s.emaDist1h<-2?"danger":s.emaDist1h<-1.2?"caution":"safe", title:"Giá 1h xa dưới EMA50 (<-2%)", detail:`EMA50 Δ = ${s.emaDist1h.toFixed(2)}%`, lesson:"rebound cao", active: s.emaDist1h<-2 },
  { id:"short_rsi_ob", level: s.rsi1h>70?"danger":s.rsi1h>65?"caution":"safe", title:"RSI 1h > 70 (còn momentum)", detail:`RSI = ${s.rsi1h.toFixed(1)}`, lesson:"SHORT WR thấp", active: s.rsi1h>70 },
];

const goldens = [
  { id:"g1", side:"LONG", title:"LONG 1H TRIPLE FLAT (🥇)", wr:"WR 95.2% · N=62", tpSl:"TP +5% / SL -2%",
    conditions: [
      { label:"MACD Hist 1h 0..50", live: s.macdHist1h.toFixed(1), pass: s.macdHist1h>=0 && s.macdHist1h<50 },
      { label:"|EMA50 Δ 1h| < 0.5%", live: `${s.emaDist1h>=0?"+":""}${s.emaDist1h.toFixed(2)}%`, pass: Math.abs(s.emaDist1h)<0.5 },
      { label:"HTF 4h FLAT", live: htf4h, pass: htf4h==="FLAT" },
    ],
  },
  { id:"g2", side:"LONG", title:"LONG 1H SILENT + CENTER (🥈)", wr:"WR 93.1% · N=72", tpSl:"TP +5% / SL -2%",
    conditions: [
      { label:"ATR 1h < 0.3%", live: `${s.atrPct1h.toFixed(2)}%`, pass: s.atrPct1h<0.3 },
      { label:"|EMA50 Δ 1h| < 0.5%", live: `${s.emaDist1h>=0?"+":""}${s.emaDist1h.toFixed(2)}%`, pass: Math.abs(s.emaDist1h)<0.5 },
      { label:"HTF 4h FLAT", live: htf4h, pass: htf4h==="FLAT" },
    ],
  },
  { id:"g3", side:"LONG", title:"LONG 1H SILENT (🥉, N lớn)", wr:"WR 81.0% · N=84", tpSl:"TP +5% / SL -2%",
    conditions: [
      { label:"ATR 1h < 0.3%", live: `${s.atrPct1h.toFixed(2)}%`, pass: s.atrPct1h<0.3 },
      { label:"HTF 4h FLAT", live: htf4h, pass: htf4h==="FLAT" },
    ],
  },
  { id:"g4", side:"SHORT", title:"SHORT SCALP trong UPTREND", wr:"WR 86.7% · N=45", tpSl:"TP +5% / SL -2%",
    conditions: [
      { label:"|EMA50 Δ 1h| < 0.5%", live: `${s.emaDist1h>=0?"+":""}${s.emaDist1h.toFixed(2)}%`, pass: Math.abs(s.emaDist1h)<0.5 },
      { label:"ATR 1h < 0.3%", live: `${s.atrPct1h.toFixed(2)}%`, pass: s.atrPct1h<0.3 },
      { label:"HTF 4h UP", live: htf4h, pass: htf4h==="UP" },
    ],
  },
];
goldens.forEach(g => g.allPass = g.conditions.every(c => c.pass));
goldens.sort((a,b) => (b.allPass?1:0) - (a.allPass?1:0) || (b.conditions.filter(c=>c.pass).length) - (a.conditions.filter(c=>c.pass).length));

// Score
const longScore = longWarnings.filter(w => !w.active).length;
const shortScore = shortWarnings.filter(w => !w.active).length;
const longPct = longScore / longWarnings.length;
const shortPct = shortScore / shortWarnings.length;
let verdict = "TRUNG LẬP", verdictColor = "#888";
if (longPct >= 0.8 && shortPct < 0.5) { verdict = "ƯU TIÊN LONG"; verdictColor = "#2ed573"; }
else if (shortPct >= 0.8 && longPct < 0.5) { verdict = "ƯU TIÊN SHORT"; verdictColor = "#ff4757"; }
else if (longPct < 0.5 && shortPct < 0.5) { verdict = "TRÁNH CẢ 2 BÊN"; verdictColor = "#ffa502"; }

document.getElementById('scoreCard').style.borderColor = verdictColor;
document.getElementById('verdict').textContent = verdict;
document.getElementById('verdict').style.color = verdictColor;

function stars(v, m) {
  let h = '';
  for (let i=0; i<m; i++) h += `<span class="${i<v?'star-on':'star-off'}">★</span>`;
  h += `<span style="color:#666; font-size:11px; letter-spacing:0">  ${v}/${m}</span>`;
  return h;
}
document.getElementById('longStars').innerHTML = stars(longScore, longWarnings.length);
document.getElementById('shortStars').innerHTML = stars(shortScore, shortWarnings.length);

function renderGolden(g) {
  const passCount = g.conditions.filter(c=>c.pass).length;
  const sideColor = g.side==="LONG" ? "#2ed573" : "#ff4757";
  let html = `<div class="golden-card ${g.allPass?'pass':''}" ${!g.allPass?`style="border-color:${sideColor}40; background:${sideColor}08"`:''}>
    <div class="golden-header">
      <div class="golden-title" style="color:${sideColor}">${g.allPass?'💎':'⏸'} ${g.title}</div>
      <div class="golden-badge">${g.wr}</div>
    </div>
    <div class="golden-tpsl">${g.tpSl} · ${passCount}/${g.conditions.length} điều kiện ✓</div>`;
  for (const c of g.conditions) {
    html += `<div class="cond-row">
      <div class="cond-icon ${c.pass?'pass-yes':'pass-no'}">${c.pass?'✓':'×'}</div>
      <div class="cond-label ${c.pass?'':'pass-no'}">${c.label}</div>
      <div class="cond-live ${c.pass?'pass-yes':'pass-no'}">${c.live}</div>
    </div>`;
  }
  if (g.allPass) html += `<div class="fire-badge">🔥 FIRING NOW — vào lệnh ${g.side}</div>`;
  html += `</div>`;
  return html;
}
document.getElementById('goldens').innerHTML = goldens.map(renderGolden).join('');

function renderWarn(w) {
  const cls = w.level==="danger"?"warn-danger":w.level==="caution"?"warn-caution":"warn-safe";
  const icon = w.level==="danger"?"🔴":w.level==="caution"?"🟡":"🟢";
  return `<div class="warn-row ${cls}">
    <div class="warn-icon">${icon}</div>
    <div style="flex:1">
      <div class="warn-title ${w.active?'active':'inactive'}">${w.title}</div>
      <div class="warn-detail">${w.detail} · lesson: ${w.lesson}</div>
    </div>
  </div>`;
}
document.getElementById('longWarnings').innerHTML = longWarnings.map(renderWarn).join('');
document.getElementById('shortWarnings').innerHTML = shortWarnings.map(renderWarn).join('');
document.getElementById('longSub').textContent = longScore===longWarnings.length ? "✅ Không có warning active — LONG OK" : `❌ ${longWarnings.length-longScore} warning đang active`;
document.getElementById('shortSub').textContent = shortScore===shortWarnings.length ? "✅ Không có warning active — SHORT OK" : `❌ ${shortWarnings.length-shortScore} warning đang active`;

// Snap
const snapHtml = [
  ['1h RSI', s.rsi1h.toFixed(1)],
  ['1h MACD Hist', s.macdHist1h.toFixed(1)],
  ['1h ATR%', s.atrPct1h.toFixed(2) + '%'],
  ['4h ATR%', s.atrPct4h.toFixed(2) + '%'],
  ['15m ATR%', s.atrPct15m.toFixed(2) + '%'],
  ['1h EMA50 Δ', (s.emaDist1h>=0?"+":"") + s.emaDist1h.toFixed(2) + '%'],
  ['4h EMA50 Δ', (s.emaDist4h>=0?"+":"") + s.emaDist4h.toFixed(2) + '%'],
  ['HTF 4h state', `<span style="color:${htf4h==="UP"?"#2ed573":htf4h==="DOWN"?"#ff4757":"#ffa502"}">${htf4h}</span>`],
].map(([k,v]) => `<div class="snap-line">${k}: <span class="snap-val">${v}</span></div>`).join('');
document.getElementById('snap').innerHTML = snapHtml;
</script>
</body>
</html>
