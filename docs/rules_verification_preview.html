      <td class="${saved > 0 ? 'pos' : saved < 0 ? 'neg' : 'dim'}">${saved != null ? (saved > 0 ? '+' : '') + saved.toFixed(0) : 'null'}</td>
      <td>${drift}</td>
      <td><span class="tag ${r.classification}">${r.classification}</span></td>
      <td><div class="muted">${r.label || ''}</div>${cfgDetails.length ? `<div>${cfgDetails.join(' · ')}</div>` : ''}</td>
    </tr>`;
  }
  html += `</tbody></table>`;
  tablesEl.innerHTML += html;
}
</script>
</body>
</html>
